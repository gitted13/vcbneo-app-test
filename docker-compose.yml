services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-VCBNeo@2026!}
      - MSSQL_PID=Express
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${DB_PASSWORD:-VCBNeo@2026!}",
             "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DB_SERVER=db
      - DB_NAME=${DB_NAME:-vcbneo}
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-VCBNeo@2026!}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mssql_data:
  uploads_data:
