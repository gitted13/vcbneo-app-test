services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - deploy_ims_net
      - internal
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DB_SERVER=ims_sqlserver
      - DB_NAME=${DB_NAME:-vcbneo}
      - DB_USER=vcbneo_app
      - DB_PASSWORD=${DB_PASSWORD:-App@VCBNeo2026!}
      - SA_PASSWORD=${SA_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  deploy_ims_net:
    external: true
  internal:
    driver: bridge

volumes:
  uploads_data:
